<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luyện Nói: Khóa học Pronunciation</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --purple: #5012e6;
        --teal: #16c5b0;
        --cyan: #1ba7e6;
        --secondary: #5b6470;
        --ink: #484d4f;
        --muted: #7a8084;
        --line: #e5e7eb;
        --hover: #ededed;
        --base200: #f2f3f5;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Lexend", system-ui, sans-serif;
        color: var(--ink);
        background: #fff;
        display: flex;
        min-height: 100vh;
      }

      /* Sidebar */
      .sidebar {
        width: 240px;
        border-right: 1px solid var(--line);
        display: flex;
        flex-direction: column;
        padding: 22px 18px;
        flex-shrink: 0;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 9px;
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 34px;
      }
      .brand .logo {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 30%, #7aa9ff, #2b5bd6);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-weight: 700;
        font-size: 14px;
      }
      .nav {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .nav a {
        display: flex;
        align-items: center;
        gap: 11px;
        padding: 10px 12px;
        border-radius: 8px;
        font-size: 14px;
        color: var(--ink);
        text-decoration: none;
      }
      .nav a:hover {
        background: #f5f5f5;
      }
      .nav .ico {
        width: 18px;
        text-align: center;
        opacity: 0.8;
      }
      .sidebar-bottom {
        margin-top: auto;
        display: flex;
        flex-direction: column;
        gap: 16px;
        align-items: center;
      }
      .counter {
        width: 78px;
        height: 78px;
        border-radius: 50%;
        border: 6px solid #e3e1ec;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .counter b {
        font-size: 24px;
        color: var(--purple);
        line-height: 1;
      }
      .counter small {
        font-size: 11px;
        color: var(--muted);
      }
      .btn-buy {
        width: 100%;
        border: 1px solid var(--cyan);
        background: #fff;
        color: var(--ink);
        padding: 11px;
        border-radius: 10px;
        font-family: inherit;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
      }
      .account {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
        cursor: pointer;
        align-self: flex-start;
      }

      /* Main */
      .main {
        flex: 1;
        display: flex;
        justify-content: center;
        padding: 34px 30px;
        overflow: auto;
      }
      .content {
        width: 100%;
        max-width: 1000px;
      }
      .head {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 30px;
        margin-bottom: 24px;
      }
      .head h1 {
        font-size: 26px;
        font-weight: 700;
        line-height: 1.3;
        margin-bottom: 8px;
        max-width: 520px;
      }
      .head p {
        font-size: 14px;
        color: var(--muted);
      }
      .pbadge {
        width: 74px;
        height: 74px;
        border-radius: 50%;
        border: 2px solid var(--teal);
        color: var(--teal);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 36px;
        font-weight: 700;
        flex-shrink: 0;
      }
      .hr {
        height: 1px;
        background: var(--line);
        margin: 6px 0 22px;
      }

      /* Tabs */
      .tabs {
        display: flex;
        border-bottom: 1px solid var(--line);
        margin-bottom: 18px;
      }
      .tab {
        flex: 1;
        text-align: center;
        padding: 12px;
        font-size: 14px;
        color: var(--muted);
        background: var(--base200);
        cursor: pointer;
        border: 1px solid var(--line);
        border-bottom: none;
      }
      .tab:first-child {
        border-top-left-radius: 8px;
      }
      .tab:last-child {
        border-top-right-radius: 8px;
      }
      .tab.active {
        background: #fff;
        color: var(--ink);
        font-weight: 500;
        border-bottom: 1px solid #fff;
        position: relative;
        top: 1px;
      }

      /* Accordion */
      .acc {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .item {
        border: 1px solid var(--line);
        border-radius: 10px;
      }
      .item summary {
        list-style: none;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 22px;
        font-size: 16px;
        font-weight: 500;
        cursor: pointer;
      }
      .item summary::-webkit-details-marker {
        display: none;
      }
      .item summary .chev {
        color: var(--muted);
        transition: 0.2s;
      }
      .item[open] summary .chev {
        transform: rotate(180deg);
      }
      .collapse-content {
        padding: 0 22px 18px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .link-secondary {
        display: block;
        color: var(--secondary);
        font-size: 14px;
        text-decoration: underline;
        transition: 0.15s;
      }
      .link-secondary:hover {
        color: var(--purple);
      }
    </style>
  </head>
  <body>
    <aside class="sidebar">
      <div class="brand">
        <span class="logo">S</span> Luyện Nói
        <span style="font-size: 15px">⚽</span>
      </div>
      <nav class="nav">
        <a href="#"><span class="ico">⌂</span> Trang chủ</a>
        <a href="#"><span class="ico">▤</span> Thi thử</a>
        <a href="#"><span class="ico">⛗</span> Luyện Forecast</a>
      </nav>
      <div class="sidebar-bottom">
        <div class="counter"><b>0</b><small>/25</small></div>
        <button class="btn-buy">Mua Xịn</button>
        <div class="account"><span>◍</span> Tài khoản ▾</div>
      </div>
    </aside>

    <main class="main">
      <div class="content">
        <div class="head">
          <div>
            <h1>Khóa học Pronunciation cho band 0-5 Speaking</h1>
            <p>Luyện IPA và trọng âm của từ đơn</p>
          </div>
          <div class="pbadge">P</div>
        </div>
        <div class="hr"></div>

        <div class="tabs">
          <div class="tab active">Bài học</div>
          <div class="tab">Lịch sử luyện phát âm</div>
        </div>

        <div class="acc" id="acc"></div>
      </div>
    </main>

    <script>
      const sounds = [
        "/p/",
        "/b/",
        "/t/",
        "/d/",
        "/k/",
        "/g/",
        "/f/",
        "/v/",
        "/θ/",
        "/ð/",
        "/s/",
        "/z/",
        "/ʃ/",
        "/ʒ/",
        "/tʃ/",
        "/dʒ/",
        "/h/",
        "/m/",
        "/n/",
        "/ŋ/",
        "/r/",
        "/l/",
        "/w/",
        "/j/",
        "/ɪ/",
        "/i/",
        "/ʊ/",
        "/u/",
        "/ɛ/",
        "/ə/",
        "/ɝ/",
        "/ɔr/",
        "/æ/",
        "/ʌ/",
        "/ɔ/",
        "/eɪ/",
        "/oʊ/",
        "/aɪ/",
        "/aʊ/",
      ];
      const acc = document.getElementById("acc");
      sounds.forEach((s, i) => {
        const n = i + 1;
        const d = document.createElement("details");
        d.className = "item";
        d.innerHTML = `<summary>Bài ${n}: Luyện âm ${s} <span class="chev">▾</span></summary>
       <div class="collapse-content space-y-2">
         <a href="/alphafeature/pronun/lesson${n}/section1" class="link-secondary">${n}.1 Hướng dẫn luyện âm ${s}</a>
         <a href="/alphafeature/pronun/lesson${n}/section2" class="link-secondary">${n}.2 Luyện phát âm từ</a>
         <a href="/alphafeature/pronun/lesson${n}/section3" class="link-secondary">${n}.3 Luyện phát âm câu</a>
       </div>`;
        acc.appendChild(d);
      });
    </script>
  </body>
</html>
